<!DOCTYPE html>
<html>
  
<head>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AJ LENS</title>

<link rel="icon" href="/favicon.png" type="image/png">
<link rel="shortcut icon" href="/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

.container{
max-width:1200px;
margin:auto;
padding-left:20px;
padding-right:20px;
}


body{
margin:0;
font-family:'Poppins', sans-serif;
background:#000000;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
box-sizing:border-box;

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,42,42,0.4);
}

.logo{
display:flex;
align-items:center;
font-size:24px;
font-weight:700;
color:#ff2a2a;
font-family:'Montserrat', sans-serif;
letter-spacing:3px;
}

.logo-img{
width:30px;
height:30px;
margin-right:10px;
transition:transform 0.3s ease, filter 0.3s ease;
}

.logo:hover .logo-img{
transform:scale(1.1);
filter:drop-shadow(0 0 6px #ff2a2a);
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
position:relative;
padding-bottom:4px;
}

.menu a::after{
content:'';
position:absolute;
width:0;
height:2px;
left:0;
bottom:0;
background:#ff2a2a;
transition:width 0.3s ease;
}

.menu a:hover::after{
width:100%;
}

.menu a:hover{
color:#ff2a2a;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:10px;

background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9)),
url("/hero.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.hero p{
font-size:22px;
margin-top:10px;
opacity:0.8;
}

.button{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 30px;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:all 0.3s ease;
height:48px;
}

.button:hover{
box-shadow:0 0 12px #ff2a2a,
           0 0 25px rgba(255,42,42,0.6);
transform:translateY(-2px);
}

.secondary{
background:transparent;
border:2px solid #ff2a2a;
color:white;
transition:all 0.3s ease;
}

.secondary:hover{
background:#ff2a2a;
box-shadow:0 0 12px #ff2a2a,
           0 0 25px rgba(255,42,42,0.6);
transform:translateY(-2px);
}

  
@media (max-width:768px){

.hero h1{
font-family:'Montserrat', sans-serif;
font-size:96px;
letter-spacing:8px;
margin-bottom:10px;
text-shadow:0 8px 30px rgba(0,0,0,0.8);
}

.hero p{
font-size:22px;
margin-top:10px;
margin-bottom:30px;
opacity:0.8;
}

}
}

.menu a{
margin-left:15px;
font-size:14px;
}

.logo-img{
width:24px;
height:24px;
}

}

@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.hero-buttons{
display:flex;
align-items:center;
justify-content:center;
gap:25px;
margin-top:40px;
flex-wrap:nowrap;
}

.divider{
width:2px;
height:30px;
background:#ff2a2a;
box-shadow:0 0 10px rgba(255,42,42,0.7);
}

@media (max-width:768px){

.hero-buttons{
flex-direction:column;
}

.divider{
display:none;
}

@media (max-width:768px){

.hero{
background-position:center top;
}

}
  
}

</style>

</head>

<body>

<div class="navbar container">

<div class="logo">
<img src="/logo.png" class="logo-img">
<span>AJ LENS</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">About</a>
</div>

</div>

<section class="hero">

<h1>AJ LENS</h1>

<p>Visual Stories Through My Lens</p>

<div class="hero-buttons">

<a href="portfolio.html" class="button">Explore Gallery</a>

<div class="divider"></div>

<a href="about.html" class="button secondary">Meet The Photographer</a>

</div>
  
</section>

</body>

</html>
