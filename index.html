<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AJ LENS</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:#000;
color:white;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
box-sizing:border-box;

background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,42,42,0.4);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-size:24px;
font-weight:700;
color:#ff2a2a;
font-family:'Montserrat', sans-serif;
letter-spacing:3px;
}

.logo-img{
width:30px;
margin-right:10px;
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
position:relative;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:-5px;
width:0;
height:2px;
background:#ff2a2a;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

.menu a:hover{
color:#ff2a2a;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding-top:80px;

background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9)),
url("hero.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.hero h1{
font-family:'Montserrat', sans-serif;
font-size:120px;
letter-spacing:10px;
margin:0;
font-weight:700;
text-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.hero p{
font-size:22px;
margin-top:20px;
margin-bottom:40px;
opacity:0.85;
}

/* BUTTONS */

.hero-buttons{
display:flex;
align-items:center;
justify-content:center;
gap:25px;
}

.button{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 30px;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:0.3s;
height:48px;
}

.button:hover{
box-shadow:0 0 12px #ff2a2a,
0 0 25px rgba(255,42,42,0.6);
transform:translateY(-2px);
}

.secondary{
background:transparent;
border:2px solid #ff2a2a;
}

.secondary:hover{
background:#ff2a2a;
}

/* DIVIDER */

.divider{
width:2px;
height:30px;
background:#ff2a2a;
box-shadow:0 0 10px rgba(255,42,42,0.7);
}

/* SCROLL INDICATOR */

.scroll-indicator{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
}

.scroll-indicator span{
display:block;
width:18px;
height:18px;
border-bottom:2px solid #ff2a2a;
border-right:2px solid #ff2a2a;
transform:rotate(45deg);
animation:scrollBounce 2s infinite;
}

@keyframes scrollBounce{
0%{transform:rotate(45deg) translateY(0);}
50%{transform:rotate(45deg) translateY(10px);}
100%{transform:rotate(45deg) translateY(0);}
}

/* MOBILE */

@media (max-width:768px){

.hero h1{
font-size:56px;
letter-spacing:5px;
}

.hero p{
font-size:16px;
}

.hero-buttons{
flex-direction:column;
}

.divider{
display:none;
}

.menu a{
margin-left:15px;
font-size:14px;
}

.logo-img{
width:24px;
}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
<img src="logo.png" class="logo-img">
AJ LENS
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">About</a>
</div>

</div>

<section class="hero">

<h1>AJ LENS</h1>

<p>Visual Stories Through My Lens</p>

<div class="hero-buttons">

<a href="portfolio.html" class="button">Explore Gallery</a>

<div class="divider"></div>

<a href="about.html" class="button secondary">Meet The Photographer</a>

</div>

<div class="scroll-indicator">
<span></span>
</div>

</section>

</body>

</html>
