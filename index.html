<!DOCTYPE html>
<html>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  
<head>

<title>AJ Lens</title>

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:#000000;
color:white;
}

.navbar{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
box-sizing:border-box;
}

.logo{
font-size:24px;
font-weight:700;
color:#ff2a2a;
font-family:'Montserrat', sans-serif;
letter-spacing:3px;
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
position:relative;
padding-bottom:4px;
}

.menu a::after{
content:'';
position:absolute;
width:0;
height:2px;
left:0;
bottom:0;
background:#ff2a2a;
transition:width 0.3s ease;
}

.menu a:hover::after{
width:100%;
}

.menu a:hover{
color:#ff2a2a;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
letter-spacing:10px;
margin:0;
font-weight:700;
font-family:'Montserrat', sans-serif;
}

.hero p{
font-size:22px;
margin-top:10px;
opacity:0.8;
}

.button{
margin-top:30px;
padding:14px 30px;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:all 0.3s ease;
}

.button:hover{
box-shadow:0 0 12px #ff2a2a,
           0 0 25px rgba(255,42,42,0.6);
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">AJ LENS</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">About</a>
</div>

</div>

<section class="hero">

<h1>AJ LENS</h1>

<p>Capturing Stories Through Light</p>

<a class="button">Explore Work</a>

</section>

</body>

</html>
